<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Black Crown Markets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: #f8f9fa;
            color: #141d22;
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 263px;
            height: 100vh;
            background: #ffffff;
            border-right: 1px solid #e3e4e5;
            overflow-y: auto;
            padding: 24px 0;
            flex-shrink: 0;
        }

        .sidebar-section {
            padding: 0 16px;
            margin-bottom: 24px;
        }

        .sidebar-section-title {
            font-size: 12px;
            font-weight: 600;
            color: #8d9194;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 16px;
            margin: 0 -16px 12px -16px;
        }

        .sidebar-item {
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 14px;
            color: #141d22;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-item:hover {
            background-color: #f8f9fa;
        }

        .sidebar-item.active {
            background-color: #e8f3fe;
            color: #1172cc;
            font-weight: 500;
        }

        .sidebar-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            height: 56px;
            background: #ffffff;
            border-bottom: 1px solid #e3e4e5;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #141d22;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .balance {
            font-size: 14px;
            color: #8d9194;
        }

        .balance-amount {
            font-size: 18px;
            font-weight: 600;
            color: #141d22;
            margin-top: 4px;
        }

        .header-icons {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f8f9fa;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #141d22;
            transition: background-color 0.2s;
            font-size: 18px;
        }

        .icon-btn:hover {
            background: #e3e4e5;
        }

        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #bcbec0;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #8d9194;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-item active">
                    <div class="sidebar-icon">📊</div>
                    <span>Dashboard</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Trading</div>
                <div class="sidebar-item">
                    <div class="sidebar-icon">💼</div>
                    <span>My accounts</span>
                </div>
                <div class="sidebar-item">
                    <div class="sidebar-icon">📈</div>
                    <span>Performance</span>
                </div>
                <div class="sidebar-item">
                    <div class="sidebar-icon">📋</div>
                    <span>Order history</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Wallet</div>
                <div class="sidebar-item">
                    <div class="sidebar-icon">💰</div>
                    <span>Balance</span>
                </div>
                <div class="sidebar-item">
                    <div class="sidebar-icon">💳</div>
                    <span>Deposit</span>
                </div>
                <div class="sidebar-item">
                    <div class="sidebar-icon">📤</div>
                    <span>Withdrawal</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Other</div>
                <div class="sidebar-item">
                    <div class="sidebar-icon">⚙️</div>
                    <span>Settings</span>
                </div>
                <div class="sidebar-item">
                    <div class="sidebar-icon">❓</div>
                    <span>Support</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <div class="header-title">Dashboard</div>
                </div>
                <div class="header-right">
                    <div class="header-icons">
                        <button class="icon-btn" title="Theme">🌙</button>
                        <button class="icon-btn" title="Language">🌍</button>
                        <button class="icon-btn" title="Notifications">🔔</button>
                        <button class="icon-btn" title="Profile">👤</button>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <div class="content">
                <!-- Content goes here -->
                <h1>Welcome to Dashboard</h1>
                <p>Your content will go here, mate.</p>
            </div>
        </div>
    </div>
</body>
</html>
