<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account | Black Crown Markets</title>
<link href="favicon.png" rel="shortcut icon" type="image/png"/>
<link href="favicon.png" rel="icon" type="image/png"/>
<link href="favicon.png" rel="apple-touch-icon"/>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: white;
  color: #000;
}

.main-container {
  display: flex;
  min-height: 100vh;
}

.left-section {
  display: none;
  position: relative;
  width: 50%;
  height: 100vh;
  background: #0a0e27;
  overflow: hidden;
  position: sticky;
  top: 0;
}

.left-section.visible {
  display: block;
}

.carousel-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
}

.carousel-slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.7s ease-in-out;
}

.carousel-slide.active {
  opacity: 1;
}

.carousel-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.carousel-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2), transparent);
}

.carousel-content {
  position: absolute;
  bottom: 80px;
  left: 0;
  right: 0;
  z-index: 10;
  text-align: center;
  padding: 0 40px;
}

.carousel-content h2 {
  color: white;
  font-size: 32px;
  font-weight: bold;
  margin-bottom: 24px;
  line-height: 1.2;
}

.carousel-indicators {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  gap: 12px;
}

.indicator {
  width: 40px;
  height: 2px;
  border-radius: 1px;
  cursor: pointer;
  transition: background 0.3s, width 0.3s;
  background: rgba(255, 255, 255, 0.3);
}

.indicator.active {
  background: #6c3fd4;
  width: 40px;
}

.logo {
  position: absolute;
  top: 32px;
  left: 32px;
  z-index: 10;
}

.logo img {
  height: 48px;
  width: auto;
}

.right-section {
  display: flex;
  flex-direction: column;
  width: 100%;
  min-height: 100vh;
}

@media (min-width: 1024px) {
  .left-section.visible {
    display: block;
  }

  .right-section {
    width: 50%;
  }
}

.form-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 40px 24px 32px;
}

.form-content {
  max-width: 400px;
  width: 100%;
  margin: 0 auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.form-header {
  margin-bottom: 32px;
}

.form-header h1 {
  font-size: 28px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 8px;
  line-height: 1.2;
}

.form-header p {
  font-size: 16px;
  color: #666;
  line-height: 1.5;
}

form {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: #1a1a1a;
  margin-bottom: 8px;
}

.form-group input {
  padding: 12px 16px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
  transition: border-color 0.3s, box-shadow 0.3s;
  background: white;
  color: #1a1a1a;
}

.form-group input:focus {
  outline: none;
  border-color: #000;
  box-shadow: 0 0 0 1px #000;
}

.form-group input::placeholder {
  color: #999;
}

.submit-btn {
  padding: 14px 16px;
  background: #6c3fd4;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.3s;
  width: 100%;
}

.submit-btn:hover {
  background: #5a2fb8;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e0e0e0;
}

.divider span {
  font-size: 12px;
  color: #999;
}

.google-btn {
  padding: 12px 16px;
  background: white;
  color: #1a1a1a;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.3s, border-color 0.3s;
}

.google-btn:hover {
  background: #f5f5f5;
  border-color: #d0d0d0;
}

.google-icon {
  width: 18px;
  height: 18px;
}

.form-footer {
  margin-top: 24px;
  text-align: center;
  font-size: 14px;
  color: #666;
}

.form-footer a {
  color: #6c3fd4;
  text-decoration: none;
  font-weight: 500;
}

.form-footer a:hover {
  text-decoration: underline;
}

.back-link {
  text-align: center;
  margin-top: 20px;
}

.back-link a {
  color: #6c3fd4;
  text-decoration: none;
  font-size: 14px;
}

.back-link a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="main-container">
  <div class="left-section visible">
    <div class="logo">
      <img src="https://ffxlryusmstnfjedleds.supabase.co/storage/v1/object/public/Assets/blackcrown%20Colour.svg" alt="Black Crown Markets"/>
    </div>

    <div class="carousel-wrapper">
      <div class="carousel-slide active">
        <div class="carousel-overlay"></div>
      </div>
      <div class="carousel-slide">
        <div class="carousel-overlay"></div>
      </div>
      <div class="carousel-slide">
        <div class="carousel-overlay"></div>
      </div>

      <div class="carousel-content">
        <h2>Welcome to Black Crown Markets</h2>
      </div>

      <div class="carousel-indicators">
        <div class="indicator active" onclick="switchSlide(0)"></div>
        <div class="indicator" onclick="switchSlide(1)"></div>
        <div class="indicator" onclick="switchSlide(2)"></div>
      </div>
    </div>
  </div>

  <div class="right-section">
    <div class="form-wrapper">
      <div class="form-content">
        <div class="form-header">
          <h1>Create Account</h1>
          <p>Join Black Crown Markets today</p>
        </div>

        <form>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required/>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required/>
          </div>

          <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <div class="divider">
          <span>Or continue with</span>
        </div>

        <button type="button" class="google-btn" onclick="handleGoogleSignUp()">
          <svg class="google-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign up with Google
        </button>

        <div class="form-footer">
          Already have an account? <a href="index.html">Sign in</a>
        </div>

        <div class="back-link">
          <a href="index.html">← Back to homepage</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let currentSlide = 0;
const slides = document.querySelectorAll('.carousel-slide');
const indicators = document.querySelectorAll('.indicator');

function switchSlide(index) {
  slides[currentSlide].classList.remove('active');
  indicators[currentSlide].classList.remove('active');

  currentSlide = index;

  slides[currentSlide].classList.add('active');
  indicators[currentSlide].classList.add('active');
}

// Auto-rotate slides
setInterval(() => {
  switchSlide((currentSlide + 1) % slides.length);
}, 5000);

function handleGoogleSignUp() {
  alert('Google sign-up integration coming soon');
}

document.querySelector('form').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  alert(`Account created with email: ${email}`);
});

// Hide left section on mobile
function updateLayout() {
  const leftSection = document.querySelector('.left-section');
  if (window.innerWidth < 1024) {
    leftSection.classList.remove('visible');
  } else {
    leftSection.classList.add('visible');
  }
}

updateLayout();
window.addEventListener('resize', updateLayout);
</script>
</body>
</html>
