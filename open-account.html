<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Open Account | Black Crown Markets</title>
<link href="favicon.png" rel="shortcut icon" type="image/png"/>
<link href="favicon.png" rel="icon" type="image/png"/>
<link href="favicon.png" rel="apple-touch-icon"/>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f5;
  min-height: 100vh;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  background: white;
  border-radius: 20px;
  padding: 40px 24px;
}

.back-arrow {
  font-size: 24px;
  cursor: pointer;
  margin-bottom: 30px;
  color: #000;
}

.header {
  margin-bottom: 30px;
}

.header h1 {
  font-size: 32px;
  font-weight: 700;
  color: #000;
  margin-bottom: 12px;
}

.header p {
  font-size: 16px;
  color: #999;
  line-height: 1.5;
}

.phone-input-group {
  display: flex;
  gap: 12px;
  margin: 30px 0;
}

.country-code {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f0f0f0;
  border-radius: 12px;
  padding: 12px 16px;
  min-width: 100px;
  cursor: pointer;
  border: 1px solid #e0e0e0;
}

.country-flag {
  width: 24px;
  height: 24px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: white;
  font-size: 12px;
}

.country-code-text {
  font-weight: 500;
  color: #000;
}

.phone-input-wrapper {
  flex: 1;
  position: relative;
}

.phone-input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  font-size: 16px;
  background: #f5f5f5;
  font-weight: 500;
}

.clear-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: #ddd;
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #999;
  font-size: 18px;
}

.login-link {
  text-align: center;
  margin: 30px 0;
}

.login-link a {
  color: #007aff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
}

.signup-btn {
  width: 100%;
  padding: 16px;
  background: #007aff;
  color: white;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 40px;
  transition: background 0.3s;
}

.signup-btn:hover {
  background: #0051d5;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.key {
  aspect-ratio: 1;
  background: white;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  font-size: 24px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.key:hover {
  background: #f5f5f5;
}

.key small {
  font-size: 10px;
  color: #999;
  font-weight: 400;
  margin-top: 2px;
}

.key.special {
  background: #f0f0f0;
  border: none;
  font-size: 18px;
}

.bottom-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.bottom-row .key {
  aspect-ratio: auto;
}

@media (max-width: 600px) {
  .container {
    padding: 24px 16px;
    border-radius: 16px;
  }

  .header h1 {
    font-size: 28px;
  }

  .keypad {
    gap: 10px;
  }

  .key {
    font-size: 20px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="back-arrow" onclick="window.history.back()">←</div>

  <div class="header">
    <h1>Let's get started!</h1>
    <p>Enter your phone number. We will send you a confirmation code there</p>
  </div>

  <div class="phone-input-group">
    <div class="country-code" onclick="selectCountry()">
      <div class="country-flag">🇸🇬</div>
      <div class="country-code-text">+65</div>
    </div>
    <div class="phone-input-wrapper">
      <input type="tel" class="phone-input" id="phone" placeholder="9036 6027" maxlength="12"/>
      <button class="clear-btn" onclick="clearPhone()">✕</button>
    </div>
  </div>

  <div class="login-link">
    <a href="index.html">Already have an account? Log in</a>
  </div>

  <button class="signup-btn" onclick="submitPhone()">Sign up</button>

  <div class="keypad">
    <div class="key" onclick="addDigit('1')">1</div>
    <div class="key" onclick="addDigit('2')">
      2
      <small>ABC</small>
    </div>
    <div class="key" onclick="addDigit('3')">
      3
      <small>DEF</small>
    </div>
    <div class="key" onclick="addDigit('4')">
      4
      <small>GHI</small>
    </div>
    <div class="key" onclick="addDigit('5')">
      5
      <small>JKL</small>
    </div>
    <div class="key" onclick="addDigit('6')">
      6
      <small>MNO</small>
    </div>
    <div class="key" onclick="addDigit('7')">
      7
      <small>PQRS</small>
    </div>
    <div class="key" onclick="addDigit('8')">
      8
      <small>TUV</small>
    </div>
    <div class="key" onclick="addDigit('9')">
      9
      <small>WXYZ</small>
    </div>
  </div>

  <div class="bottom-row">
    <div class="key special" onclick="addDigit('+')">+ * #</div>
    <div class="key" onclick="addDigit('0')">0</div>
    <div class="key special" onclick="deleteDigit()">⌫</div>
  </div>
</div>

<script>
function addDigit(digit) {
  const phone = document.getElementById('phone');
  if (digit === '+' || digit === '*' || digit === '#') {
    // Only allow + at the start
    if (digit === '+' && phone.value === '') {
      phone.value = '+';
    }
  } else {
    if (phone.value.length < 12) {
      phone.value += digit;
    }
  }
}

function deleteDigit() {
  const phone = document.getElementById('phone');
  phone.value = phone.value.slice(0, -1);
}

function clearPhone() {
  document.getElementById('phone').value = '';
}

function selectCountry() {
  // Country selector would go here
  alert('Country selector coming soon');
}

function submitPhone() {
  const phone = document.getElementById('phone').value;
  if (phone.length < 7) {
    alert('Please enter a valid phone number');
    return;
  }
  alert(`Sign up with phone: +65 ${phone}`);
  // Phone verification logic would go here
}
</script>
</body>
</html>
