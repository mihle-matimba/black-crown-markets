*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Inter','Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--void); color:var(--text); overflow:hidden;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
.scene{
  position:fixed;inset:0;overflow:hidden;
  background:radial-gradient(120% 80% at 50% -10%, #160a2e 0%, #0a0418 32%, var(--void) 62%), var(--void);
}
.stars{
  position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 82% 14%, rgba(203,182,255,.6), transparent),
    radial-gradient(1px 1px at 67% 38%, rgba(255,255,255,.45), transparent),
    radial-gradient(1.2px 1.2px at 28% 64%, rgba(203,182,255,.5), transparent),
    radial-gradient(1px 1px at 91% 56%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 45% 9%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 8% 72%, rgba(203,182,255,.4), transparent),
    radial-gradient(1px 1px at 73% 78%, rgba(255,255,255,.35), transparent);
  opacity:0;animation:starsIn 2.4s ease forwards .2s, twinkle 6s ease-in-out infinite 2.6s;
}
.planet-wrap{
  position:absolute;top:0;left:50%;width:min(1500px,142vw);
  transform:translate(-50%,-14%);will-change:transform;pointer-events:none;
}
.planet{
  display:block;width:100%;height:auto;
  -webkit-mask-image:radial-gradient(72% 88% at 50% 34%, #000 50%, rgba(0,0,0,.5) 70%, transparent 84%);
          mask-image:radial-gradient(72% 88% at 50% 34%, #000 50%, rgba(0,0,0,.5) 70%, transparent 84%);
  opacity:0;animation:planetIn 2.2s cubic-bezier(.2,.7,.2,1) forwards .15s;
}
.plasma{
  position:absolute;left:50%;top:46%;width:62vw;height:48vh;
  transform:translate(-50%,0);pointer-events:none;opacity:0;
  animation:plasmaIn 2.6s ease forwards .5s;
}
.plasma::before,.plasma::after{content:"";position:absolute;inset:0;border-radius:50%;}
.plasma::before{
  background:radial-gradient(50% 60% at 50% 60%, rgba(242,234,255,.55) 0%, rgba(177,69,224,.45) 26%, rgba(123,63,242,.32) 48%, transparent 72%);
  filter:blur(36px);animation:breathe 7s ease-in-out infinite;
}
.plasma::after{
  background:radial-gradient(42% 70% at 50% 58%, rgba(255,255,255,.5) 0%, rgba(190,120,255,.4) 30%, transparent 66%);
  filter:blur(20px);transform:scaleX(.7);animation:breathe 5.5s ease-in-out infinite reverse;
}
.rock{
  position:absolute;pointer-events:none;opacity:0;
  filter:drop-shadow(0 18px 40px rgba(60,20,120,.45));
  animation:rockIn 1.4s ease forwards var(--in,.6s);will-change:transform;
}
.rock .rk{
  width:100%;background:center/contain no-repeat var(--src);
  animation:float var(--dur,9s) ease-in-out infinite var(--del,0s);
}
.depth-far{filter:drop-shadow(0 10px 26px rgba(60,20,120,.4)) blur(1.1px);opacity:.78;}
.content{
  position:relative;z-index:5;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:clamp(20px,5vw,48px);gap:clamp(18px,3vh,30px);
}
.logo{
  width:clamp(190px,26vw,330px);height:auto;
  opacity:0;transform:translateY(14px);
  animation:up 1s cubic-bezier(.2,.7,.2,1) forwards 1s;
  filter:drop-shadow(0 6px 26px rgba(150,90,255,.35));
}
h1{
  font-family:'Poppins',sans-serif;font-weight:700;
  font-size:clamp(2.7rem,9.2vw,7.2rem);line-height:.98;letter-spacing:-.01em;color:#fff;
  text-shadow:0 0 38px rgba(176,124,255,.45), 0 2px 16px rgba(0,0,0,.5);
  opacity:0;transform:translateY(18px);
  animation:up 1.05s cubic-bezier(.2,.7,.2,1) forwards 1.12s;
}
.tagline{
  max-width:32ch;font-size:clamp(.95rem,1.9vw,1.15rem);line-height:1.55;
  color:var(--muted);font-weight:400;
  opacity:0;transform:translateY(16px);
  animation:up 1s cubic-bezier(.2,.7,.2,1) forwards 1.28s;
}
.foot{
  position:absolute;left:0;right:0;bottom:clamp(16px,3vh,30px);z-index:5;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  opacity:0;animation:up 1.1s ease forwards 1.7s;
}
.socials{display:flex;gap:18px;}
.socials a{color:var(--muted);line-height:0;transition:color .2s, transform .2s;}
.socials a:hover{color:#fff;transform:translateY(-2px);}
.socials svg{width:20px;height:20px;display:block;}
.copy{font-size:.74rem;letter-spacing:.04em;color:rgba(231,224,255,.35);}
@keyframes planetIn{from{opacity:0;transform:translateY(-26px) scale(1.015);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes plasmaIn{to{opacity:1;}}
@keyframes starsIn{to{opacity:1;}}
@keyframes rockIn{from{opacity:0;transform:translateY(20px) scale(.94);}to{opacity:1;transform:none;}}
@keyframes up{to{opacity:1;transform:translateY(0);}}
@keyframes float{0%,100%{transform:translateY(0) rotate(var(--rot,0deg));}50%{transform:translateY(var(--amp,-16px)) rotate(calc(var(--rot,0deg) + var(--spin,4deg)));}}
@keyframes breathe{0%,100%{opacity:.72;transform:scale(.96);}50%{opacity:1;transform:scale(1.06);}}
@keyframes twinkle{0%,100%{opacity:1;}50%{opacity:.55;}}
@media (max-width:640px){
  .planet-wrap{width:200vw;transform:translate(-50%,-8%);}
  .plasma{width:96vw;top:60%;height:42vh;}
  .rock.hide-sm{display:none;}
  .depth-far{opacity:.6;}
  /* tuck the big rocks into the bottom corners, well clear of the form */
  .rock--big{width:124px !important;top:auto !important;bottom:2% !important;}
  .rock--bigL{left:-7% !important;}
  .rock--bigR{right:-7% !important;}
  /* shrink + lift the left rock off the headline */
  .rock--midL{width:62px !important;top:15% !important;left:5% !important;}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms !important;animation-delay:0ms !important;}
  .planet,.plasma,.stars,.rock,.rock .rk,.logo,h1,.tagline,.foot{opacity:1 !important;transform:none !important;}
}
</style>
</head>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches, fine=matchMedia('(pointer: fine)').matches;
if(!reduce&&fine){
  const layers=[...document.querySelectorAll('[data-parallax]')];
  let tx=0,ty=0,cx=0,cy=0;
  addEventListener('pointermove',e=>{tx=(e.clientX/innerWidth-.5);ty=(e.clientY/innerHeight-.5);});
  (function loop(){
    cx+=(tx-cx)*.06;cy+=(ty-cy)*.06;
    for(const el of layers){
      const d=parseFloat(el.dataset.parallax)*100;
      const base=el.classList.contains('planet-wrap')?'translate(-50%,-14%) ':'';
      const flip=(el.style.transform&&el.style.transform.includes('scaleX(-1)'))?' scaleX(-1)':'';
      el.style.transform=base+`translate(${cx*d}px, ${cy*d}px)`+flip;
    }
    requestAnimationFrame(loop);
  })();
}
</script>
